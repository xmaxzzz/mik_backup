services:
  app:
    build: .
    image: mik-backup:latest
    container_name: mik-backup
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATA_DIR: /data
    expose:
      - "8000"
    volumes:
      # persists SQLite DB and backup files across rebuilds
      - ./data:/data

  caddy:
    image: caddy:2
    container_name: mik-backup-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
